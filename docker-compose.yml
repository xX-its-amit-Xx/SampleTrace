# SampleTrace docker-compose.
#
# Usage:
#   docker compose run --rm reconcile               # mock-mode smoke test
#   docker compose run --rm reconcile-real          # real Benchling (set env)
#   docker compose up dashboard                     # interactive dashboard
#
# Mount your sample sheet / fastq dir / config in via the volumes section.

services:
  reconcile:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: sampletrace:latest
    command: >
      reconcile --mock
        --sample-sheet /data/SampleSheet.csv
        --output-dir /out
        --run-id docker_demo
    volumes:
      - ./tests/fixtures:/data:ro
      - ./reports:/out

  reconcile-real:
    image: sampletrace:latest
    command: >
      reconcile
        --benchling-config /config/bch.yml
        --sample-sheet /data/SampleSheet.csv
        --fastq-dir /data/fastq
        --output-dir /out
        --fail-on-flagged
    environment:
      BENCHLING_API_KEY: ${BENCHLING_API_KEY}
    volumes:
      - ./config:/config:ro
      - ./data:/data:ro
      - ./reports:/out

  dashboard:
    image: sampletrace:latest
    command: >
      dashboard --report /out/sample_provenance.json --port 8501
    ports:
      - "8501:8501"
    volumes:
      - ./reports:/out:ro
